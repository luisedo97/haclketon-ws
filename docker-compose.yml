services:
  mysql:
    image: mysql:8
    container_name: wsspy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wsspy}
      MYSQL_USER: ${MYSQL_USER:-wsspy}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wsspy}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - wsspy_net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: wsspy-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wsspy_net

  ollama:
    image: ollama/ollama:latest
    container_name: wsspy-ollama
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    networks:
      - wsspy_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wsspy-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-mysql://wsspy:wsspy@mysql:3306/wsspy}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      AI_CONTEXT_WINDOW: ${AI_CONTEXT_WINDOW:-15}
      AI_WORKER_INTERVAL_MS: ${AI_WORKER_INTERVAL_MS:-5000}
      AI_WORKER_BATCH_SIZE: ${AI_WORKER_BATCH_SIZE:-5}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LINK_CODE_TTL_MIN: ${LINK_CODE_TTL_MIN:-15}
      SESSIONS_PATH: ${SESSIONS_PATH:-/data/sessions}
    ports:
      - '${API_PORT:-3000}:3000'
    volumes:
      - sessions_data:/data/sessions
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - wsspy_net

volumes:
  mysql_data:
  ollama_data:
  sessions_data:

networks:
  wsspy_net:
    driver: bridge
